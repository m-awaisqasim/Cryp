<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JARVIS STT</title>
  <style>
    body { font-family: Arial, sans-serif; background: #050b10; color: #d8f8ff; }
    .wrap { max-width: 720px; margin: 32px auto; padding: 16px; }
    button { padding: 10px 14px; margin-right: 8px; }
    .log { margin-top: 16px; white-space: pre-wrap; font-size: 14px; }
    .status { margin-top: 8px; color: #8ffcff; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>JARVIS Web Speech STT</h2>
    <p>Click start, speak, and transcripts are sent to the desktop app.</p>
    <div>
      <button id="start">Start</button>
      <button id="stop">Stop</button>
    </div>
    <div class="status" id="status">Idle</div>
    <div class="log" id="log"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      statusEl.textContent = 'Web Speech API is not supported in this browser.';
      startBtn.disabled = true;
      stopBtn.disabled = true;
    }

    const ws = new WebSocket('ws://127.0.0.1:8765');
    ws.onopen = () => statusEl.textContent = 'Connected to JARVIS';
    ws.onclose = () => statusEl.textContent = 'WebSocket disconnected';

    let recognition;

    function startRecognition() {
      if (!SpeechRecognition) return;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.continuous = true;
      recognition.interimResults = false;

      recognition.onstart = () => statusEl.textContent = 'Listening...';
      recognition.onend = () => statusEl.textContent = 'Stopped';
      recognition.onerror = (e) => statusEl.textContent = 'Error: ' + e.error;

      recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript.trim();
        if (!result) return;
        logEl.textContent += result + '\n';
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ text: result }));
        }
      };

      recognition.start();
    }

    function stopRecognition() {
      if (recognition) {
        recognition.stop();
        recognition = null;
      }
    }

    startBtn.addEventListener('click', startRecognition);
    stopBtn.addEventListener('click', stopRecognition);
  </script>
</body>
</html>
